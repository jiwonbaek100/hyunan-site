<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>현안 콘텐츠 발행</title><style>body{margin:0;background:#f1f2f2;color:#26292b;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif;display:grid;min-height:100vh;place-items:center}.box{width:min(calc(100% - 40px),600px);background:#fff;border-radius:18px;padding:40px;box-shadow:0 20px 60px rgba(18,40,61,.08)}h1{font-size:30px;margin:0 0 15px}p{color:#727779;line-height:1.7}.button{display:block;text-align:center;background:#12283d;color:#fff;text-decoration:none;padding:15px;border-radius:9px;margin:28px 0 20px}.steps{font-size:14px;padding-left:20px;line-height:1.9}.note{font-size:12px}</style></head><body><main class="box"><h1>현안 콘텐츠 발행</h1><p>GitHub에 저장되는 현안 전용 글 편집기를 엽니다. 작성한 글은 hyunan.kr 안에 독립된 페이지로 발행되고 홈페이지 최신 글에도 자동 노출됩니다.</p><a class="button" href="https://app.pagescms.org/" target="_blank" rel="noopener">콘텐츠 편집기 열기</a><ol class="steps"><li>GitHub 계정으로 로그인</li><li><strong>jiwonbaek100/hyunan-site</strong> 선택</li><li>인사이트·성공사례에서 새 글 작성</li><li>공개를 켜고 저장</li></ol><p class="note">최초 1회는 Pages CMS GitHub 앱의 저장소 접근 승인이 필요합니다. 사건 관계인의 개인정보와 식별 가능한 사실은 반드시 비식별화한 뒤 게시하세요.</p></main></body></html>
