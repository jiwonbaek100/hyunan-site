<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>{{ page.title }} | 법률사무소 현안</title>
  <meta name="description" content="{{ page.description | strip_html | escape }}">
  <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <meta property="og:locale" content="ko_KR"><meta property="og:type" content="article"><meta property="og:site_name" content="법률사무소 현안">
  <meta property="og:title" content="{{ page.title | escape }}"><meta property="og:description" content="{{ page.description | escape }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}"><meta property="og:image" content="{{ page.image | absolute_url }}">
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"Article","headline":{{ page.title | jsonify }},"description":{{ page.description | jsonify }},"datePublished":"{{ page.date | date_to_xmlschema }}","dateModified":"{{ page.last_modified_at | default: page.date | date_to_xmlschema }}","author":{"@type":"Organization","name":{{ page.author | jsonify }}},"publisher":{"@type":"LegalService","name":"법률사무소 현안","url":"https://hyunan.kr"},"image":"{{ page.image | absolute_url }}","mainEntityOfPage":"{{ page.url | absolute_url }}","inLanguage":"ko-KR"}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/intake.css">
  <style>
    :root{--bg:#f1f2f2;--paper:#fff;--ink:#26292b;--sub:#727779;--line:#d9dcdd;--navy:#12283d;--max:880px}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--paper);color:var(--ink);font-family:'Noto Sans KR',sans-serif;line-height:1.85;word-break:keep-all}a{color:inherit;text-decoration:none}.wrap{width:min(calc(100% - 44px),var(--max));margin:auto}.header{height:76px;border-bottom:1px solid var(--line);display:flex;align-items:center;background:rgba(255,255,255,.94);position:sticky;top:0;z-index:10;backdrop-filter:blur(16px)}.nav{display:flex;align-items:center;justify-content:space-between}.logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:600}.logo img{width:25px;height:27px;object-fit:contain}.back{font-size:13px;color:var(--sub)}.hero{padding:92px 0 60px;background:var(--bg)}.meta{font-size:13px;color:var(--sub);margin:0 0 20px}.hero h1{font-size:clamp(36px,6vw,62px);line-height:1.3;letter-spacing:-.055em;margin:0 0 26px}.lede{font-size:18px;color:var(--sub);max-width:720px;margin:0}.cover{margin-top:56px;height:min(52vw,470px);border-radius:18px;overflow:hidden}.cover img{width:100%;height:100%;object-fit:cover;filter:saturate(.68)}.article{padding:76px 0 120px;font-size:17px}.article h2{font-size:30px;line-height:1.45;letter-spacing:-.04em;margin:64px 0 20px}.article h3{font-size:22px;margin:42px 0 14px}.article p,.article ul,.article ol{margin:0 0 26px}.article p>img{display:block;width:100%;max-height:520px;object-fit:cover;border-radius:16px;margin:40px 0 10px;filter:saturate(.72)}.article blockquote{margin:36px 0;padding:22px 26px;background:var(--bg);border-left:3px solid var(--navy)}.notice{margin-top:72px;padding-top:24px;border-top:1px solid var(--line);font-size:13px;color:var(--sub)}.cta{margin-top:40px;padding:30px;background:var(--navy);color:#fff;border-radius:16px;display:flex;align-items:center;justify-content:space-between;gap:24px}.cta span{font-size:20px;font-weight:600}.cta button{border:1px solid rgba(255,255,255,.4);background:transparent;color:#fff;padding:12px 18px;font:inherit;cursor:pointer}.modal{position:fixed;inset:0;z-index:100;display:grid;place-items:center;padding:20px;background:rgba(15,25,33,.52);opacity:0;visibility:hidden;transition:.3s}.modal.open{opacity:1;visibility:visible}.modal-panel{width:min(100%,620px);max-height:92vh;overflow:auto;background:#fff;border-radius:20px;padding:34px;transform:translateY(18px) scale(.98);transition:.4s cubic-bezier(.22,1,.36,1)}.modal.open .modal-panel{transform:none}.modal-head{display:flex;justify-content:space-between}.modal-close{border:0;background:none;font-size:25px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{display:flex;flex-direction:column;gap:7px}.field.full{grid-column:1/-1}.field label{font-size:12px;color:var(--sub)}.field input,.field select,.field textarea{font:inherit;padding:12px;border:1px solid var(--line);border-radius:8px;background:#fff}.field textarea{min-height:130px;resize:vertical}.check{font-size:12px;color:var(--sub)}.submit{width:100%;margin-top:18px;padding:15px;border:0;border-radius:8px;background:var(--navy);color:#fff;font:inherit}.status{font-size:13px;margin-top:12px}.hp{position:absolute;left:-9999px}@media(max-width:620px){.hero{padding-top:58px}.cover{height:260px}.article{padding-top:54px}.form-grid{grid-template-columns:1fr}.field.full{grid-column:auto}.modal{padding:0;align-items:end}.modal-panel{border-radius:20px 20px 0 0;max-height:94svh}}
  </style>
</head>
<body>
  <header class="header"><div class="wrap nav"><a class="logo" href="/"><img src="/images/hyeonan-logo.png" alt="현안 로고">법률사무소 현안</a><a class="back" href="/insights/">인사이트 전체보기 →</a></div></header>
  <main><section class="hero"><div class="wrap"><p class="meta">{{ page.category }} · {{ page.practice }} · {{ page.date | date: '%Y.%m.%d' }}</p><h1>{{ page.title }}</h1><p class="lede">{{ page.description }}</p><div class="cover"><img src="{{ page.image }}" alt="{{ page.title | escape }}" loading="eager"></div></div></section><article class="article"><div class="wrap">{{ content }}<p class="notice">※ 구체적인 결과는 개별 사건의 사실관계와 증거에 따라 달라질 수 있습니다. 이 글은 일반적인 법률정보이며 개별 사건에 대한 법률자문이 아닙니다.</p><div class="cta"><span>내 사건도 검토가 필요하다면</span><button type="button" data-intake-open>사건 문의하기</button></div></div></article></main>
  {% include intake-modal.html %}
  <script src="/assets/intake.js" defer></script>
</body>
</html>
