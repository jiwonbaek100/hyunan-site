name: Publish Baek Jiwon profile

on:
  schedule:
    # 2026-07-27 09:00 KST (00:00 UTC)
    - cron: "0 0 27 7 *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.run_started_at >= '2026-07-27T00:00:00Z'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish scheduled profile
        shell: python
        run: |
          from pathlib import Path

          index = Path("index.html")
          html = index.read_text(encoding="utf-8")
          html = html.replace(
              "<!-- BAEKJIWON_PUBLISH_POINT -->",
              '<article class="person collab"><span class="role">협업변호사</span><h3>백지원</h3><div class="focus">학교폭력 · 형사 · 민사집행</div><p>학교폭력 절차와 형사·민사 분쟁을 세심하게 검토하고, 당사자의 일상까지 고려한 해결을 함께 모색합니다.</p><p class="person-note">※ 사건별 협업 형태로 참여합니다.</p></article>'
          )
          index.write_text(html, encoding="utf-8")

          llms = Path("llms.txt")
          text = llms.read_text(encoding="utf-8")
          text = text.replace(
              "<!-- BAEKJIWON_LLMS_PUBLISH_POINT -->",
              "- 백지원 협업변호사: 학교폭력, 형사, 민사·집행 사건을 사건별 협업 형태로 수행"
          )
          llms.write_text(text, encoding="utf-8")

      - name: Commit publication
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html llms.txt
          git commit -m "Publish Baek Jiwon collaborator profile"
          git push
