<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1a2e"/>
      <stop offset="60%" style="stop-color:#182e7b"/>
      <stop offset="100%" style="stop-color:#1e3a6e"/>
    </linearGradient>
    <linearGradient id="beam" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- spotlight rays -->
  <polygon points="400,0 340,600 460,600" fill="url(#beam)"/>
  <polygon points="400,0 310,600 370,600" fill="url(#beam)" opacity="0.4"/>
  <polygon points="400,0 430,600 490,600" fill="url(#beam)" opacity="0.4"/>
  <!-- scales of justice -->
  <g transform="translate(270,90)" stroke="#fff" fill="none" stroke-linecap="round">
    <!-- pillar -->
    <line x1="130" y1="0" x2="130" y2="300" stroke-width="5" stroke="rgba(255,255,255,0.7)"/>
    <rect x="100" y="295" width="60" height="8" rx="2" fill="rgba(255,255,255,0.55)"/>
    <!-- crossbar -->
    <line x1="10" y1="60" x2="250" y2="60" stroke-width="5" stroke="rgba(255,255,255,0.7)"/>
    <circle cx="130" cy="60" r="8" fill="rgba(255,255,255,0.8)"/>
    <!-- left pan chain -->
    <line x1="40" y1="60" x2="20" y2="130" stroke-width="3" stroke="rgba(255,255,255,0.55)"/>
    <line x1="40" y1="60" x2="60" y2="130" stroke-width="3" stroke="rgba(255,255,255,0.55)"/>
    <!-- left pan -->
    <path d="M10,130 Q40,155 70,130" stroke-width="4" stroke="rgba(255,255,255,0.75)"/>
    <!-- right pan chain (slightly lower) -->
    <line x1="220" y1="60" x2="200" y2="148" stroke-width="3" stroke="rgba(255,255,255,0.55)"/>
    <line x1="220" y1="60" x2="240" y2="148" stroke-width="3" stroke="rgba(255,255,255,0.55)"/>
    <!-- right pan -->
    <path d="M190,148 Q220,173 250,148" stroke-width="4" stroke="rgba(255,220,100,0.85)"/>
  </g>
  <!-- gavel silhouette -->
  <g transform="translate(530,300)" opacity="0.3">
    <rect x="0" y="20" width="80" height="30" rx="6" fill="rgba(255,255,255,0.9)" transform="rotate(-40 40 35)"/>
    <rect x="35" y="48" width="10" height="80" rx="4" fill="rgba(255,255,255,0.7)" transform="rotate(-40 40 48)"/>
  </g>
  <rect x="0" y="520" width="800" height="80" fill="rgba(0,0,0,0.35)"/>
  <!-- logo -->
  <g transform="translate(56,44)" opacity="0.45">
    <polygon points="0,0 0,52 14,44 14,28" fill="#fff"/>
    <polygon points="14,28 14,44 36,52 36,8" fill="rgba(255,255,255,0.55)"/>
    <polygon points="0,0 14,8 14,28 0,20" fill="rgba(255,255,255,0.75)"/>
  </g>
</svg>